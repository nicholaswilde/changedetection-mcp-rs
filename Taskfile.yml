version: '3'

dotenv: ['.env']

vars:
  BINARY: target/release/changedetection-mcp-rs

tasks:
  encrypt:
    desc: Encrypt files using SOPS
    preconditions:
      - sh: test -f .env
        msg: ".env file doens't exist"
    cmds:
      - sops -e --input-type dotenv --output-type dotenv .env > .env.enc
      - sops -e --input-type json --output-type json .gemini/settings.json > .gemini/settings.json.enc
  decrypt:
    desc: Decrypt files using SOPS
    preconditions:
      - sh: test -f .env.enc
        msg: ".env.enc doesn't exist"
    cmds:
      - sops -d --input-type dotenv --output-type dotenv .env.enc > .env
      - sops -d --input-type json --output-type json .gemini/settings.json.enc > .gemini/settings.json

  clippy:
    desc: Run cargo clippy
    cmds:
      - cargo clippy --workspace --all-targets --all-features -- -D warnings

  default:
    cmds:
      - task -l

  update:
    desc: Update all cargo dependencies
    cmds:
      - cargo update

  build:local:
    desc: Build the project in release mode for the current architecture
    cmds:
      - cargo build --release

  build:amd64:
    desc: Build for amd64 (x86_64-unknown-linux-gnu)
    cmds:
      - cross build --release --target x86_64-unknown-linux-gnu

  build:arm64:
    desc: Build for arm64 (aarch64-unknown-linux-gnu)
    cmds:
      - cross build --release --target aarch64-unknown-linux-gnu

  build:armv7:
    desc: Build for armv7 (armv7-unknown-linux-gnueabihf)
    cmds:
      - cross build --release --target armv7-unknown-linux-gnueabihf

  build:debug:
    desc: Build the project in debug mode
    cmds:
      - cargo build

  run:
    desc: Run the project
    deps: [build:debug]
    cmds:
      - ./target/debug/changedetection-mcp-rs {{.CLI_ARGS}}

  check:
    desc: Check code for errors without generating binary
    cmds:
      - cargo check

  test:
    desc: Run unit tests only
    cmds:
      - cargo test --lib --tests {{.CLI_ARGS}}

  test:ci:
    desc: Run all checks (format, lint, and unit tests)
    cmds:
      - task: fmt:check
      - task: lint
      - task: test
      - task: clippy

  fmt:
    desc: Format code with rustfmt
    cmds:
      - cargo fmt --all --check

  fmt:check:
    desc: Check code formatting with rustfmt
    cmds:
      - cargo fmt -- --check

  docs:
    desc: Generate documentation
    cmds:
      - cargo doc --no-deps

  lint:
    desc: Lint code with clippy
    cmds:
      - cargo clippy -- -D warnings

  clean:
    desc: Clean build artifacts
    cmds:
      - cargo clean

  inspector:
    desc: Run MCP Inspector (requires npx)
    cmds:
      - task: build:local
      - npx @modelcontextprotocol/inspector {{.BINARY}}

  coverage:
    desc: Run tests and show coverage summary
    cmds:
      - cargo llvm-cov --workspace --all-features --summary-only

  coverage:report:
    desc: Generate coverage reports (lcov and html)
    cmds:
      - cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - cargo llvm-cov --workspace --all-features --html

  coverage:upload:
    desc: Upload coverage report to Coveralls
    precondition:
      - sh: test -f lcov.info
        msg: "lcov.info doesn't exist"
    cmds:
      - coveralls report lcov.info  -n -r {{ .COVERALLS_REPO_TOKEN }}
    silent: true

  test:live:
    desc: Run live integration tests against a real ChangeDetection.io instance
    cmds:
      - RUN_LIVE_TESTS=1 cargo test --test live -- --nocapture

  test:hurl:
    desc: Run Hurl integration tests (requires running server)
    cmds:
      - |
        if command -v hurl >/dev/null 2>&1; then
          hurl --test tests/hurl/*.hurl
        else
          echo "Hurl not found. Running tests via curl/bash fallback..."
          bash tests/hurl/run_tests.sh
        fi

  docker:build:
    desc: Build Docker image
    cmds:
      - docker build -t changedetection-mcp-rs .

  docker:run:
    desc: Run Docker image
    cmds:
      - docker run --rm -it changedetection-mcp-rs {{.CLI_ARGS}}
