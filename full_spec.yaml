- description: "## How Processor Plugins Extend the API\n\nchangedetection.io uses\
    \ a **processor plugin** system to handle different types of change detection.\n\
    Each processor lives in `changedetectionio/processors/<name>/` and may include\
    \ an `api.yaml` file\nthat extends the core Watch schema with processor-specific\
    \ configuration fields.\n\n### How it works\n\nAt startup, changedetection.io\
    \ scans all installed processors for an `api.yaml` file. Any schemas\nand code\
    \ samples defined there are deep-merged into the live API specification, making\
    \ the\nprocessor's configuration fields valid on all watch create and update requests.\n\
    \nThe live, fully-merged spec is always available at `/api/v1/full-spec` — use\
    \ that URL with\nSwagger UI or Redoc to see the complete schema for your specific\
    \ installation.\n\n---\n\n### Writing a processor `api.yaml`\n\nPlace an `api.yaml`\
    \ in the processor plugin's own directory, alongside its `__init__.py`\n(e.g.\
    \ `changedetectionio/processors/my_processor/api.yaml`). The schema name **must**\
    \ follow the\nconvention `processor_config_<processor_name>` (e.g. `processor_config_restock_diff`).\
    \ That same\nkey is used as the JSON field name when creating or updating a watch.\n\
    \nA minimal `api.yaml` for a hypothetical `my_processor`:\n\n```yaml\ncomponents:\n\
    \  schemas:\n    processor_config_my_processor:\n      type: object\n      description:\
    \ Configuration for my_processor\n      properties:\n        some_option:\n  \
    \        type: boolean\n          default: true\n          description: Enable\
    \ some behaviour\n\npaths:\n  /watch:\n    post:\n      x-code-samples:\n    \
    \    - lang: curl\n          label: my_processor example\n          source: |\n\
    \            curl -X POST \"http://localhost:5000/api/v1/watch\" \\\n        \
    \      -H \"x-api-key: YOUR_API_KEY\" \\\n              -H \"Content-Type: application/json\"\
    \ \\\n              -d '{\n                \"url\": \"https://example.com\",\n\
    \                \"processor\": \"my_processor\",\n                \"processor_config_my_processor\"\
    : { \"some_option\": true }\n              }'\n```\n\nThe `paths` section in `api.yaml`\
    \ is used only for injecting additional `x-code-samples` into\nexisting endpoints\
    \ — you cannot define new routes via plugin.\n\n---\n\n### Built-in plugin: `restock_diff`\n\
    \nThe `restock_diff` processor is always shipped with changedetection.io. It monitors\
    \ product\navailability and price changes using structured data (JSON-LD / schema.org\
    \ microdata) and\ntext heuristics. It is activated by setting `\"processor\":\
    \ \"restock_diff\"` on a watch.\n\nIt adds the `processor_config_restock_diff`\
    \ block to the Watch schema with these fields:\n\n| Field | Type | Default | Description\
    \ |\n|---|---|---|---|\n| `in_stock_processing` | string | `in_stock_only` | `in_stock_only`\
    \ — only alert Out-of-Stock→In-Stock · `all_changes` — alert any availability\
    \ change · `off` — disable stock tracking |\n| `follow_price_changes` | boolean\
    \ | `true` | Monitor and alert on price changes |\n| `price_change_min` | number\\\
    |null | — | Alert when price drops **below** this value |\n| `price_change_max`\
    \ | number\\|null | — | Alert when price rises **above** this value |\n| `price_change_threshold_percent`\
    \ | number\\|null | — | Minimum % change since the original price to trigger an\
    \ alert |\n\n#### CREATE — Add a restock/price monitor\n\n```bash\ncurl -X POST\
    \ \"http://localhost:5000/api/v1/watch\" \\\n  -H \"x-api-key: YOUR_API_KEY\"\
    \ \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"url\": \"https://example.com/product/widget\"\
    ,\n    \"processor\": \"restock_diff\",\n    \"processor_config_restock_diff\"\
    : {\n      \"in_stock_processing\": \"in_stock_only\",\n      \"follow_price_changes\"\
    : true,\n      \"price_change_threshold_percent\": 5\n    }\n  }'\n```\n\n####\
    \ READ — Retrieve the monitor\n\nThe response JSON includes `processor_config_restock_diff`\
    \ alongside all standard watch fields:\n\n```bash\ncurl -X GET \"http://localhost:5000/api/v1/watch/cc0cfffa-f449-477b-83ea-0caafd1dc091\"\
    \ \\\n  -H \"x-api-key: YOUR_API_KEY\"\n```\n\n```json\n{\n  \"uuid\": \"cc0cfffa-f449-477b-83ea-0caafd1dc091\"\
    ,\n  \"url\": \"https://example.com/product/widget\",\n  \"processor\": \"restock_diff\"\
    ,\n  \"processor_config_restock_diff\": {\n    \"in_stock_processing\": \"in_stock_only\"\
    ,\n    \"follow_price_changes\": true,\n    \"price_change_threshold_percent\"\
    : 5,\n    \"price_change_min\": null,\n    \"price_change_max\": null\n  }\n}\n\
    ```\n\n#### UPDATE — Change thresholds without recreating the monitor\n\nOnly\
    \ fields included in the request body are updated; omitted fields are left unchanged.\n\
    \n```bash\ncurl -X PUT \"http://localhost:5000/api/v1/watch/cc0cfffa-f449-477b-83ea-0caafd1dc091\"\
    \ \\\n  -H \"x-api-key: YOUR_API_KEY\" \\\n  -H \"Content-Type: application/json\"\
    \ \\\n  -d '{\n    \"processor_config_restock_diff\": {\n      \"in_stock_processing\"\
    : \"all_changes\",\n      \"follow_price_changes\": true,\n      \"price_change_min\"\
    : 10.00,\n      \"price_change_max\": 500.00\n    }\n  }'\n```\n\n#### DELETE\
    \ — Remove the monitor\n\n```bash\ncurl -X DELETE \"http://localhost:5000/api/v1/watch/cc0cfffa-f449-477b-83ea-0caafd1dc091\"\
    \ \\\n  -H \"x-api-key: YOUR_API_KEY\"\n```\n\n---\n\nFor the complete schema-validated\
    \ documentation including all processor fields, fetch the live spec\nand load\
    \ it into Swagger UI or Redoc:\n\n```\nGET /api/v1/full-spec\n```\n"
  name: Plugin API Extensions
