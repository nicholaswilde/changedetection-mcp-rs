          \                        headers=headers, json=data)\nprint(response.text)\n"
  /watch/{uuid}/difference/{from_timestamp}/{to_timestamp}:
    get:
      description: 'Generate a difference (comparison) between two historical snapshots
        of a web page change monitor (watch).


        This endpoint compares content between two points in time and returns the
        differences in your chosen format.

        Perfect for reviewing what changed between specific versions or comparing
        recent changes.


        **Timestamp Keywords:**

        - Use `''latest''` for the most recent snapshot (to_timestamp)

        - Use `''previous''` for the second-most-recent snapshot (from_timestamp)

        - Or use specific Unix timestamps from the watch history


        **Format Options:**

        - `text` (default): Plain text with (removed) and (added) prefixes

        - `html`: HTML format with (removed) and (added) text

        - `htmlcolor`: Rich HTML with colored highlights (green for additions, red
        for deletions)


        **Word-Level Diffing:**

        - Enable word-level granularity with `word_diff=true` for detailed inline
        comparisons

        - Disable with `word_diff=false` for line-level comparisons only (default
        false/off, line-level mode by default)


        **Raw Diff Output:**

        - Use `no_markup=true` to get raw diff content without any formatting applied

        - Returns content with placeholders for opening/closing tags of changes

        - Allows you to implement your own custom colorisation or formatting

        - Skips all HTML color application and service tweaks (added text, html color
        tags, etc)

        '
      operationId: getWatchHistoryDiff
      parameters:
      - description: Web page change monitor (watch) unique ID
        in: path
        name: uuid
        required: true
        schema:
          format: uuid
          type: string
      - description: Starting snapshot timestamp, 'previous' for second-most-recent,
          or specific Unix timestamp
        example: previous
        in: path
        name: from_timestamp
        required: true
        schema:
          oneOf:
          - description: Unix timestamp of the starting snapshot
            type: integer
          - description: Use 'previous' to automatically select the second-most-recent
              snapshot
            enum:
            - previous
            type: string
      - description: Ending snapshot timestamp, 'latest' for most recent, or specific
          Unix timestamp
        example: latest
        in: path
        name: to_timestamp
        required: true
        schema:
          oneOf:
          - description: Unix timestamp of the ending snapshot
            type: integer
          - description: Use 'latest' to automatically select the most recent snapshot
            enum:
            - latest
            type: string
      - description: 'Output format for the diff:

          - `text` (default): Plain text with (removed) and (added) prefixes

          - `html`: Basic HTML format

          - `htmlcolor`: Rich HTML with colored backgrounds (red for deletions, green
          for additions)

          - `markdown`: Markdown format with HTML rendering

          '
        in: query
        name: format
        schema:
          default: text
          enum:
          - text
          - html
          - htmlcolor
          - markdown
          type: string
      - description: 'Enable word-level diffing for more granular comparisons.

          When enabled, changes are highlighted at the word level rather than line
          level.

          Default is false (line-level mode).

          Accepts: true, false, 1, 0, yes, no, on, off

          '
        in: query
        name: word_diff
        schema:
          default: 'false'
          enum:
          - 'true'
          - 'false'
          - '1'
          - '0'
          - 'yes'
          - 'no'
          - 'on'
          - 'off'
          type: string
      - description: 'When set to true, returns the raw diff content without any markup
          formatting.

          The content will include placeholders for opening/closing tags of the changes,

          allowing you to implement your own custom colorisation or formatting.

          This skips all HTML color application and service tweaks.

          Accepts: true, false, 1, 0, yes, no, on, off

          '
        in: query
        name: no_markup
        schema:
          default: 'false'
          enum:
          - 'true'
          - 'false'
          - '1'
          - '0'
          - 'yes'
          - 'no'
          - 'on'
          - 'off'
          type: string
      - description: 'Diff granularity type:

          - `diffLines` (default): Line-level comparison, showing which lines changed

          - `diffWords`: Word-level comparison, showing which words changed within
          lines


          This parameter is an alternative to `word_diff` for better alignment with
          the UI.

          If both are specified, `type=diffWords` will enable word-level diffing.

          '
        in: query
        name: type
        schema:
          default: diffLines
          enum:
          - diffLines
          - diffWords
          type: string
      - description: 'When enabled, only show lines/content that changed (no surrounding
          context).

          When disabled, include unchanged lines for context around changes.

          Accepts: true, false, 1, 0, yes, no, on, off

          '
        in: query
        name: changesOnly
        schema:
          default: 'true'
          enum:
          - 'true'
          - 'false'
          - '1'
          - '0'
          - 'yes'
          - 'no'
          - 'on'
          - 'off'
          type: string
      - description: 'When enabled, ignore whitespace-only changes (spaces, tabs,
          newlines).

          Useful for focusing on content changes and ignoring formatting differences.

          Accepts: true, false, 1, 0, yes, no, on, off

          '
        in: query
        name: ignoreWhitespace
        schema:
          default: 'false'
          enum:
          - 'true'
          - 'false'
          - '1'
          - '0'
          - 'yes'
          - 'no'
          - 'on'
          - 'off'
          type: string
      - description: 'Include removed/deleted content in the diff output.

          When disabled, content that was deleted will not appear in the diff.

          Accepts: true, false, 1, 0, yes, no, on, off

          '
        in: query
        name: removed
        schema:
          default: 'true'
          enum:
          - 'true'
          - 'false'
          - '1'
          - '0'
          - 'yes'
          - 'no'
          - 'on'
          - 'off'
          type: string
      - description: 'Include added/new content in the diff output.

          When disabled, content that was added will not appear in the diff.

          Accepts: true, false, 1, 0, yes, no, on, off

          '
        in: query
        name: added
        schema:
          default: 'true'
          enum:
          - 'true'
          - 'false'
          - '1'
          - '0'
          - 'yes'
          - 'no'
          - 'on'
          - 'off'
          type: string
      - description: 'Include replaced/modified content in the diff output.

          When disabled, content that was modified (changed from one value to another)
          will not appear in the diff.

          Accepts: true, false, 1, 0, yes, no, on, off

          '
        in: query
        name: replaced
        schema:
          default: 'true'
          enum:
          - 'true'
          - 'false'
          - '1'
          - '0'
          - 'yes'
          - 'no'
          - 'on'
          - 'off'
          type: string
      responses:
        '200':
          content:
            text/html:
              schema:
                description: HTML formatted diff with styling
                type: string
            text/plain:
              schema:
                description: Plain text diff with change markers
                type: string
          description: Formatted diff between the two snapshots
        '400':
          description: Invalid format parameter or invalid request
        '404':
          description: Watch not found, timestamps not found, or insufficient history
      summary: Get the difference between two snapshots
      tags:
      - Watch History
      x-code-samples:
      - lang: curl
        source: "# Compare previous snapshot to latest with colored HTML\ncurl -X\
          \ GET \"http://localhost:5000/api/v1/watch/095be615-a8ad-4c33-8e9c-c7612fbf6c9f/difference/previous/latest?format=htmlcolor\"\
          \ \\\n  -H \"x-api-key: YOUR_API_KEY\"\n\n# Compare two specific timestamps\
          \ in plain text with word-level diff\ncurl -X GET \"http://localhost:5000/api/v1/watch/095be615-a8ad-4c33-8e9c-c7612fbf6c9f/difference/1640995200/1640998800?format=text&word_diff=true\"\
          \ \\\n  -H \"x-api-key: YOUR_API_KEY\"\n\n# Show only additions (hide removed/replaced\
          \ content), ignore whitespace\ncurl -X GET \"http://localhost:5000/api/v1/watch/095be615-a8ad-4c33-8e9c-c7612fbf6c9f/difference/previous/latest?format=htmlcolor&removed=false&replaced=false&ignoreWhitespace=true\"\
          \ \\\n  -H \"x-api-key: YOUR_API_KEY\"\n"
      - lang: Python
        source: "import requests\n\nheaders = {'x-api-key': 'YOUR_API_KEY'}\nuuid\
          \ = '095be615-a8ad-4c33-8e9c-c7612fbf6c9f'\n\n# Compare previous to latest\
          \ with colored HTML output\nresponse = requests.get(\n    f'http://localhost:5000/api/v1/watch/{uuid}/difference/previous/latest',\n\
          \    headers=headers,\n    params={'format': 'htmlcolor'}\n)\nprint(response.text)\n\
          \n# Compare specific timestamps with word-level diff\nfrom_ts = '1640995200'\n\
          to_ts = '1640998800'\nresponse = requests.get(\n    f'http://localhost:5000/api/v1/watch/{uuid}/difference/{from_ts}/{to_ts}',\n\
          \    headers=headers,\n    params={'format': 'text', 'word_diff': 'true'}\n\
          )\nprint(response.text)\n\n# Show only additions, ignore whitespace and\
          \ use word-level diff\nresponse = requests.get(\n    f'http://localhost:5000/api/v1/watch/{uuid}/difference/previous/latest',\n\
          \    headers=headers,\n    params={\n        'format': 'htmlcolor',\n  \
          \      'type': 'diffWords',\n        'removed': 'false',\n        'replaced':\
          \ 'false',\n        'ignoreWhitespace': 'true'\n    }\n)\nprint(response.text)\n"
